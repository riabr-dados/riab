    type: string
    description: "Numero SALIC do projeto"
  - name: titulo_projeto
    type: string
    description: "Titulo do projeto"
  - name: data_pub_aprovacao_projeto
    type: date
    description: "Data de publicacao da aprovacao do projeto"
    nullable: true
  - name: data_primeira_liberacao
    type: date
    description: "Data da primeira liberacao"
    nullable: true
  - name: situacao_atual
    type: string
    description: "Situacao atual do projeto"
    nullable: true
  - name: mecanismo
    type: string
    description: "Mecanismo principal de captacao"
    nullable: true
  - name: captado_art1
    type: float64
    description: "Valor captado pelo Art. 1"
  - name: captado_art1a
    type: float64
    description: "Valor captado pelo Art. 1-A"
  - name: captado_art3
    type: float64
    description: "Valor captado pelo Art. 3"
  - name: captado_art3a
    type: float64
    description: "Valor captado pelo Art. 3-A"
  - name: captado_art18
    type: float64
    description: "Valor captado pelo Art. 18"
  - name: captado_art25
    type: float64
    description: "Valor captado pelo Art. 25"
  - name: captado_art39
    type: float64
    description: "Valor captado pelo Art. 39"
  - name: captado_funcines
    type: float64
    description: "Valor captado via FUNCINES"
  - name: captado_edital_ancine
    type: float64
    description: "Valor captado por edital ANCINE"
  - name: captado_par
    type: float64
    description: "Valor captado em PAR"
  - name: captado_paq
    type: float64
    description: "Valor captado em PAQ"
  - name: captado_outros_editais
    type: float64
    description: "Valor captado por outros editais"
  - name: captado_lei_estadual
    type: float64
