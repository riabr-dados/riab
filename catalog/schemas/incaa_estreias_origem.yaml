    type: integer
    description: "Ano de referencia"
  - name: estreias_nacionais
    type: integer
    description: "Numero de estreias de filmes nacionais"
  - name: estreias_estrangeiros
    type: integer
    description: "Numero de estreias de filmes estrangeiros"
