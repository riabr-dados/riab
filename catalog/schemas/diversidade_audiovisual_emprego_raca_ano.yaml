table: diversidade_audiovisual_emprego_raca_ano
description: >
  Serie anual de empregos formais do setor audiovisual por raca ou cor,
  transcrita da Tabela 2 do estudo ANCINE Genero e Raca no Setor Audiovisual
  2011-2021.

source_raw: ancine-diversidade-audiovisual

columns:
  - name: ano
    type: int64
    description: "Ano de referencia"
  - name: raca_cor
    type: string
    description: "Categoria de raca ou cor publicada na tabela"
  - name: empregos_formais_ativos_31_12
    type: int64
    description: "Empregos formais ativos em 31 de dezembro"
  - name: total_ano
    type: int64
    description: "Total anual da tabela publicada"
  - name: fonte_tabela
    type: string
    description: "Elemento da publicacao de origem"
  - name: status_serie
    type: string
    description: "Status de reconstrucao da serie"
  - name: nota_metodologica
    type: string
    description: "Resumo do escopo metodologico aplicado"
  - name: fonte_arquivo
    type: string
    description: "Arquivo oficial usado como fonte"
  - name: fonte_url
    type: string
    description: "URL oficial do arquivo fonte"
  - name: fonte_pagina
    type: string
    description: "Pagina oficial onde a publicacao foi encontrada"
  - name: hash_fonte
    type: string
    nullable: true
    description: "SHA-256 do PDF fonte no snapshot bruto"
