table: pib_audiovisual_total_ano
description: >
  Serie anual total de valor adicionado bruto do setor audiovisual e suas
  participacoes relativas, reconstruida a partir do estudo ANCINE/OCA Valor
  Adicionado pelo Setor Audiovisual, ano-base 2019.

source_raw: br-pib-audiovisual

columns:
  - name: ano
    type: int64
    description: "Ano de referencia"
  - name: valor_adicionado_brl_milhoes_correntes
    type: float64
    description: "Valor adicionado bruto em milhoes de reais correntes"
  - name: valor_adicionado_brl_correntes
    type: int64
    description: "Valor adicionado bruto em reais correntes"
  - name: soma_atividades_brl_milhoes_correntes
    type: float64
    description: "Soma das atividades CNAE publicadas, em milhoes de reais correntes"
  - name: diferenca_total_menos_soma_atividades_brl_milhoes
    type: float64
    description: "Diferenca entre o total publicado e a soma das atividades arredondadas"
  - name: participacao_va_servicos_empresariais_nao_financeiros_pct
    type: float64
    description: "Participacao no VA dos servicos empresariais nao financeiros, em percentual"
  - name: participacao_va_total_servicos_pct
    type: float64
    description: "Participacao no valor adicionado total dos servicos, em percentual"
  - name: participacao_va_total_economia_pct
    type: float64
    description: "Participacao no valor adicionado total da economia, em percentual"
  - name: unidade_original
    type: string
    description: "Unidade publicada no estudo"
  - name: metodo_valor
    type: string
    description: "Metodo de consolidacao do total"
  - name: marcador_nota_ancine
    type: string
    nullable: true
    description: "Marcador de rodape do estudo ANCINE (*, ** ou ***)"
  - name: nota_ancine
    type: string
    nullable: true
    description: "Texto interpretativo do marcador de rodape"
