table: embrafilme_exibicao_territorio_ano
description: >
  Serie historica de exibicao pre-ANCINE extraida de PDFs tabulares do OCA
  com dados Embrafilme. Formato longo: cada linha e (ano, territorio, indicador, valor).
  Indicadores cobertos: publico, renda_brl_nominal, lugares_oferecidos,
  cinemas_cadastrados, cinemas_com_arrecadacao.

source_raw: br-embrafilme-historico-exibicao
source_columns_original: >
  Tabelas em PDF com cabecalhos por ano e linhas de meses, territorios ou
  faixas de habitantes.

columns:
  - name: ano
    type: int64
    description: "Ano de referencia"
  - name: territorio_tipo
    type: string
    description: "Tipo de recorte (brasil, regiao, uf, capitais, interior, municipio_ou_faixa, faixa_habitantes)"
  - name: territorio_nome
    type: string
    description: "Nome do territorio, 'Brasil' quando nacional"
  - name: uf
    type: string
    nullable: true
    description: "UF quando o recorte permite identificar"
  - name: regiao
    type: string
    nullable: true
    description: "Regiao quando o recorte permite identificar"
  - name: origem_filme
    type: string
    description: "Origem agregada informada pela fonte (nacionais_e_estrangeiros)"
  - name: fonte_documento
    type: string
    description: "PDF oficial de origem"
  - name: confiabilidade
    type: string
    description: "Classificacao da origem do dado"
  - name: indicador
    type: string
    description: "Indicador da linha: publico | renda_brl_nominal | lugares_oferecidos | cinemas_cadastrados | cinemas_com_arrecadacao"
  - name: valor
    type: float64
    description: "Valor numerico do indicador na unidade indicada por unidade_original"
  - name: unidade_original
    type: string
    description: "Unidade declarada/inferida pela fonte (CRUZADO, espectadores, mil_espectadores, mil_lugares, cinemas)"
  - name: mes
    type: int64
    nullable: true
    description: "Mes (1-12) quando a linha e mensal"
  - name: mes_nome
    type: string
    nullable: true
    description: "Nome do mes original"

notes:
  - "A renda historica mantem a unidade monetaria nominal informada nos PDFs; nao foi convertida para reais atuais."
  - "Formato longo: para reconstruir wide, pivote por (ano, territorio_tipo, territorio_nome, mes) com indicador como coluna."
  - "O PDF 'arrecadacao por faixa de habitantes' adiciona linhas com territorio_tipo='faixa_habitantes' e os indicadores cinemas_cadastrados e cinemas_com_arrecadacao."
