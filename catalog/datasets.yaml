  - slug: ancine-condecine-arrecadacao
    title: "CONDECINE - Arrecadacao"
    description: >
      Serie consolidada da arrecadacao total da CONDECINE publicada pelo OCA/ANCINE.
      Une a serie anual 2007-2025 e as planilhas mensais disponiveis para 2010-2025,
      preservando tipo de CONDECINE, arquivo de origem, URL oficial e hash.
      Para recolhimento detalhado por artigo de lei e por empresa contribuinte,
      ver ancine-condecine-recolhimento.
    source_id: ancine
    status: ativo
    coverage: "2007-2025"
    tags: [tributacao, condecine, arrecadacao, oca, brasil, ancine]
    raw:
      path: ancine-condecine-arrecadacao/
      format: csv,xlsx,pdf
      files: 21
      size_bytes: 0
    cleaned:
      tables:
        - condecine_arrecadacao
      notes: >
        Transformacao gerada a partir dos CSVs oficiais do OCA Dados Financeiros.
        Valores reais deflacionados permanecem nulos ate a ligacao com deflator
