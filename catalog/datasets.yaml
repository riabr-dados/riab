  - slug: br-pib-audiovisual
    title: "PIB do Audiovisual - Metodologia ANCINE"
    description: >
      Serie factual de valor adicionado bruto do setor audiovisual, reconstruida
      a partir da metodologia e do Anexo 1 do estudo ANCINE/OCA Valor Adicionado
      pelo Setor Audiovisual, ano-base 2019. A serie segue o recorte de empresas
      com 20 ou mais pessoas ocupadas, por classes CNAE 2.0, usando tabulacao
      especial IBGE/PAS/PAC e estimativas ANCINE para TV por assinatura por cabo
      de 2015 em diante. O dataset e uma reconstrucao documental da serie
      publicada pela ANCINE. A reproducao por fonte primaria externa depende de
      acesso a tabulacoes IBGE/PAS/PAC equivalentes as usadas pela ANCINE.
    source_id: ancine
    status: ativo
    coverage: "2007-2019"
    tags: [pib, valor-adicionado, economia, oca, brasil, ancine, ibge]
    raw:
      path: br-pib-audiovisual/
      format: pdf
      files: 7
      size_bytes: 0
    cleaned:
      tables:
        - pib_audiovisual_total_ano
        - pib_audiovisual_atividade_ano
        - pib_audiovisual_fontes
      notes: >
        A tabela factual exata cobre 2007-2019, limite da publicacao mais
        recente localizada no OCA. O dataset publicado inclui somente a serie
        oficial que hoje pode ser reconstruida com base documental ANCINE/OCA,
        sem extensoes proxy para anos posteriores. Pequenas diferencas entre a
        soma das atividades e o total anual podem ocorrer por arredondamento
        das linhas publicadas no Anexo 1.
    methodology_layers:
      published_layer:
        name: publicado_ancine
        status: implementado
        source: "ANCINE/OCA - Valor Adicionado pelo Setor Audiovisual"
      primary_reprocessing:
        name: reprocessado_fonte_primaria
        status: planejado_dependente_de_tabulacao
        source: "IBGE PAS/PAC, tabulacao por CNAE e porte; ANATEL para estimativas de TV paga por cabo"
        notes: >
          O estudo usa tabulacao especial IBGE para empresas com 20 ou mais
          pessoas ocupadas e estimativas ANCINE para 61.41-8 de 2015 em diante.
          Reprocessar exige reproduzir essas tabulacoes ou obter microdados com
          variaveis compativeis.
    related:
      - ibge-deflator-ipca

