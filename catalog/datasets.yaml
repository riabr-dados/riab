    description: >
      Valores recolhidos de CONDECINE desagregados por artigo de lei (Art. 3 e
      Art. 3A da Lei 8.685/93 e Art. 39 da MP 2.228-1/01) e por empresa
      contribuinte (distribuidoras, programadoras e empresas de video domestico).
      Complementa a serie de arrecadacao total (ancine-condecine-arrecadacao)
      com granularidade por mecanismo e por CNPJ contribuinte. Publicado pelo
      OCA/ANCINE. Cobertura historica 2002-2017, sem atualizacao posterior.
    source_id: ancine
    status: intermitente
    coverage: "2002-2017"
    tags: [tributacao, condecine, recolhimento, contribuinte, oca, brasil, ancine]
    raw:
      path: ancine-condecine-recolhimento/
      format: csv,xlsx,pdf
      files: 21
      size_bytes: 0
    cleaned:
      tables:
        - condecine_recolhimento
      notes: >
        Processado pelo mesmo parser de fluxos financeiros (clean_oca_complementos.py).
        Agrega arquivos por artigo de lei (wide-year) e por empresa contribuinte
        (detail). tipo_fluxo = recolhido.
    related:
      - ancine-condecine-arrecadacao
      - ibge-deflator-ipca

  - slug: ancine-fomento-fluxos-financeiros
