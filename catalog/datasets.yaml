  - slug: br-pib-audiovisual
    title: "PIB do Audiovisual - Metodologia ANCINE"
    description: >
      Serie factual de valor adicionado bruto do setor audiovisual, reconstruida
      a partir da metodologia e do Anexo 1 do estudo ANCINE/OCA Valor Adicionado
      pelo Setor Audiovisual, ano-base 2019. A serie segue o recorte de empresas
      com 20 ou mais pessoas ocupadas, por classes CNAE 2.0, usando tabulacao
      especial IBGE/PAS/PAC e estimativas ANCINE para TV por assinatura por cabo
      de 2015 em diante. O dataset e uma reconstrucao documental da serie
      publicada pela ANCINE. A reproducao por fonte primaria externa depende de
      acesso a tabulacoes IBGE/PAS/PAC equivalentes as usadas pela ANCINE.
