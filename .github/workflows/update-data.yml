name: Atualizar Dados

on:
  schedule:
    - cron: "0 6 * * 1"   # toda segunda-feira as 06:00 UTC
  workflow_dispatch:
    inputs:
      dataset:
        description: "Slug do dataset (deixe vazio para todos)"
        required: false
        default: ""

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipelines/requirements.txt

      - name: Instalar dependencias Python
        run: pip install -r pipelines/requirements.txt

      - name: Transformar para Parquet
        run: python pipelines/transform/run_all.py

      - name: Publicar no Hugging Face
        run: python pipelines/upload_hf.py
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
